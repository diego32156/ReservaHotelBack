spring.application.name=reservas

spring.datasource.url=jdbc:mysql://localhost:3306/reserva_hotel?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=sasa
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mostrar SQL y bind values
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Crear o limpiar base de datos al inicio (solo en dev)
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

# Perfil activo
spring.profiles.active=dev

# Configuraciˇn regional
spring.jackson.time-zone=America/Bogota
spring.jackson.locale=es_CO

# Servidor
server.port=8080
